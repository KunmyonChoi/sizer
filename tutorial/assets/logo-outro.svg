<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sizer">
  <defs>
    <linearGradient id="sizerBg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0EA5E9"/>
      <stop offset="0.55" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <radialGradient id="sizerSheen" cx="0.3" cy="0.25" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="0.6" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 타일 -->
  <rect x="0" y="0" width="512" height="512" rx="114" fill="url(#sizerBg)"/>
  <rect x="0" y="0" width="512" height="512" rx="114" fill="url(#sizerSheen)"/>
  <rect x="6" y="6" width="500" height="500" rx="110" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="4"/>

  <!-- 압축(안쪽으로 모이는) 화살표 -->
  <g stroke="#ffffff" stroke-width="34" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- 좌상 → 중심 (↘) -->
    <path d="M150 150 L236 236"/>
    <path d="M186 236 L236 236 L236 186"/>
    <!-- 우하 → 중심 (↖) -->
    <path d="M362 362 L276 276"/>
    <path d="M326 276 L276 276 L276 326"/>
  </g>
</svg>
