name: Sizer
options:
  bundleIdPrefix: com.dilly
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.5.1"
    CURRENT_PROJECT_VERSION: "7"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"          # ad-hoc (개인용 미공증 로컬 빌드)
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: NO       # 후속: Developer ID 확보 시 YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  Sizer:
    type: application
    platform: macOS
    sources:
      - path: Sizer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dilly.sizer
        PRODUCT_NAME: Sizer
        INFOPLIST_FILE: Sizer/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sizer/Sizer.entitlements
        GENERATE_INFOPLIST_FILE: NO
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES

  SizerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SizerTests
    dependencies:
      - target: Sizer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dilly.SizerTests
        GENERATE_INFOPLIST_FILE: YES
