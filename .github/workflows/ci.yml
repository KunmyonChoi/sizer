name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: brew install xcodegen ffmpeg

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build & test
        run: >
          xcodebuild
          -project Sizer.xcodeproj
          -scheme Sizer
          -destination 'platform=macOS'
          test
