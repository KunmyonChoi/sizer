name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    # macos-15는 Xcode 16을 기본 제공(생성되는 pbxproj 포맷과 호환).
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install tools
        run: brew install xcodegen ffmpeg

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build & test
        run: >
          xcodebuild
          -project Sizer.xcodeproj
          -scheme Sizer
          -destination 'platform=macOS'
          test
